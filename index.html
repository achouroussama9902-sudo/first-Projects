<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oussama Portfolio & Brother Art</title>
    <style>
        /* استيراد الخطوط */
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Poppins:wght@400;700&display=swap');

        /* إعدادات عامة */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', 'Poppins', sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background-color: #05070a;
            color: white;
            overflow-x: hidden;
        }

        /* الهيدر */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 10%;
            background: #0a0e14;
            border-bottom: 2px solid #ff1909;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo { font-size: 1.5rem; font-weight: bold; color: #ff1909; font-family: 'Poppins'; }
        
        nav ul { display: flex; list-style: none; gap: 2rem; }
        nav a { text-decoration: none; color: white; transition: 0.3s; font-size: 1.1rem; }
        nav a:hover { color: #ff1909; }

        /* قسم أسامة (الواجهة) */
        .hero {
            height: 85vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: radial-gradient(circle, #1a1f2b 0%, #05070a 100%);
            padding: 20px;
        }

        .hero h1 { font-size: clamp(3rem, 10vw, 5rem); margin-bottom: 10px; font-family: 'Poppins'; }
        .hero h1 span { color: #ff1909; }
        .hero p { color: #94a3b8; font-size: 1.2rem; max-width: 600px; }

        /* قسم معرض رسومات الأخ */
        .gallery-section {
            padding: 80px 10%;
            background-color: #05070a;
        }

        .section-title {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 50px;
            color: white;
        }

        .section-title span { color: #ff1909; }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        .art-card {
            background-color: #121821;
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid #1e293b;
            transition: 0.4s;
            text-align: center;
        }

        .art-card:hover {
            transform: translateY(-10px);
            border-color: #ff1909;
            box-shadow: 0 10px 30px rgba(255, 25, 9, 0.3);
        }

        .art-card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-bottom: 2px solid #1e293b;
        }

        .art-card h3 { padding: 15px 10px 5px; font-size: 1.4rem; }

        /* زر اللايك */
        .like-section { padding: 15px 0 25px; }
        .like-btn {
            background: #1e293b;
            border: 2px solid #3b82f6;
            color: white;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 1rem;
        }

        .like-btn.active {
            background: #ff1909;
            border-color: #ff1909;
        }

        .like-btn:hover { transform: scale(1.1); }

        footer {
            text-align: center;
            padding: 40px;
            background: #0a0e14;
            color: #475569;
            border-top: 1px solid #1e293b;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">OUSSAMA<span>.DEV</span></div>
        <nav>
            <ul>
                <li><a href="#home">الرئيسية</a></li>
                <li><a href="#gallery">رسومات أخي</a></li>
                <li><a href="mailto:navomoussamaa@gmail.com">اتصل بي</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero" id="home">
        <h1>I AM <span>OUSSAMA</span></h1>
        <p>مرحباً بكم في موقعي المتطور، حيث أعرض مشاريعي البرمجية ومعرض الرسومات الخاص بأخي المبدع.</p>
    </section>

    <section class="gallery-section" id="gallery">
        <h2 class="section-title">معرض رسومات <span>Poppy Playtime</span></h2>
        
        <div class="gallery">
            <div class="art-card">
                <img src="https://static.wikia.nocookie.net/poppy-playtime/images/0/03/Huggy_Wuggy_Render.png" alt="Huggy Wuggy">
                <h3>هاجي واجي</h3>
                <div class="like-section">
                    <button class="like-btn" onclick="toggleLike(this)">
                        <span>❤</span> <span class="count">0</span>
                    </button>
                </div>
            </div>

            <div class="art-card">
                <img src="https://static.wikia.nocookie.net/poppy-playtime/images/b/ba/Mommy_Long_Legs_Render.png" alt="Mommy Long Legs">
                <h3>مامي لونج ليجز</h3>
                <div class="like-section">
                    <button class="like-btn" onclick="toggleLike(this)">
                        <span>❤</span> <span class="count">0</span>
                    </button>
                </div>
            </div>

            <div class="art-card">
                <img src="https://static.wikia.nocookie.net/poppy-playtime/images/0/06/Boxy_Boo_Render.png" alt="Boxy Boo">
                <h3>بوكسي بو</h3>
                <div class="like-section">
                    <button class="like-btn" onclick="toggleLike(this)">
                        <span>❤</span> <span class="count">0</span>
                    </button>
                </div>
            </div>
        </div>
    </section>

    <footer>
        تصميم المبرمج أسامة 🚀 | جميع الحقوق محفوظة 2026
    </footer>

    <script>
        function toggleLike(btn) {
            const countSpan = btn.querySelector('.count');
            let currentCount = parseInt(countSpan.innerText);
            
            btn.classList.toggle('active');
            
            if (btn.classList.contains('active')) {
                countSpan.innerText = currentCount + 1;
            } else {
                countSpan.innerText = currentCount - 1;
            }
        }
    </script>

</body>
</html>
